<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>霓虹打砖块 | Neon Breakout</title>
<style>
  /* ===== 全局暗色主题 ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080812;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', 'Source Code Pro', monospace;
    overflow-x: hidden;
    user-select: none;
  }

  /* ===== 主布局：横向（桌面端）===== */
  .main-row {
    display: flex;
    align-items: flex-start;
    gap: 24px;
  }

  /* ===== 左侧游戏区 ===== */
  .game-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  /* ----- 顶部信息栏 ----- */
  .info-bar {
    display: flex;
    gap: 36px;
    align-items: center;
  }
  .info-item { text-align: center; }
  .info-label {
    color: #444;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .info-value {
    color: #00ff88;
    font-size: 26px;
    font-weight: bold;
    text-shadow: 0 0 14px rgba(0,255,136,0.5);
  }
  .info-value.wave {
    color: #aa44ff;
    text-shadow: 0 0 14px rgba(170,68,255,0.5);
  }
  .info-value.bonus {
    color: #00ccff;
    text-shadow: 0 0 14px rgba(0,204,255,0.5);
  }

  /* ----- 生命值 ----- */
  .lives {
    display: flex;
    gap: 6px;
  }
  .life-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ff3366;
    box-shadow: 0 0 8px rgba(255,51,102,0.6);
    transition: all 0.3s;
  }
  .life-dot.lost {
    background: #222;
    box-shadow: none;
  }

  /* ----- 画布 ----- */
  canvas {
    border: 1px solid #1a1a2e;
    border-radius: 6px;
    background: #0b0b18;
    cursor: none;
    box-shadow:
      0 0 40px rgba(80,0,200,0.12),
      inset 0 0 80px rgba(0,0,0,0.6);
  }
  .canvas-container { position: relative; }

  /* ----- 覆盖层 ----- */
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(4,4,16,0.82);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.35s;
  }
  .overlay.active { opacity: 1; pointer-events: auto; }
  .overlay-title {
    font-size: 36px;
    font-weight: bold;
    letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .overlay-sub {
    font-size: 14px;
    color: #888;
    margin-bottom: 20px;
    text-align: center;
    line-height: 1.6;
  }
  .overlay-btn {
    background: transparent;
    color: #00ff88;
    border: 1px solid #00ff8840;
    padding: 10px 30px;
    font-size: 14px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .overlay-btn:hover {
    background: #00ff8810;
    box-shadow: 0 0 18px rgba(0,255,136,0.25);
  }

  /* ----- 操作提示 ----- */
  .controls {
    display: flex;
    gap: 20px;
    align-items: center;
    color: #555;
    font-size: 11px;
    letter-spacing: 1px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .key {
    background: #141428;
    color: #777;
    border: 1px solid #252540;
    border-radius: 3px;
    padding: 3px 9px;
    font-size: 11px;
    font-family: inherit;
  }
  .key.active-key {
    color: #00ff88;
    border-color: #00ff8840;
  }

  /* ===== 右侧最高分面板（桌面端）===== */
  .best-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px 16px;
    margin-top: 52px;
    border: 1px solid #1a1a2e;
    border-radius: 6px;
    background: #0b0b18;
    min-width: 80px;
    box-shadow: 0 0 20px rgba(80,0,200,0.08);
  }
  .best-panel-label {
    color: #444;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .best-panel-value {
    color: #ffaa00;
    font-size: 32px;
    font-weight: bold;
    text-shadow: 0 0 16px rgba(255,170,0,0.5);
    transition: all 0.3s;
  }
  .best-panel-wave {
    color: #555;
    font-size: 11px;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  /* ===== 移动端：纵向堆叠 ===== */
  @media (max-width: 760px) {
    .main-row {
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .best-panel {
      flex-direction: row;
      gap: 12px;
      margin-top: 0;
      padding: 10px 20px;
      width: 100%;
      justify-content: center;
    }
    .best-panel-label {
      margin-bottom: 0;
    }
    .best-panel-value {
      font-size: 24px;
    }
    .best-panel-wave {
      margin-top: 0;
      margin-left: 4px;
    }
    canvas {
      max-width: 100%;
      height: auto;
    }
  }
</style>
</head>
<body>

<div class="main-row">
  <!-- ===== 左侧：游戏区 ===== -->
  <div class="game-area">
    <!-- 分数 / 波次 / 连击 -->
    <div class="info-bar">
      <div class="info-item">
        <div class="info-label">Score</div>
        <div class="info-value" id="scoreDisp">0</div>
      </div>
      <div class="info-item">
        <div class="info-label">Wave</div>
        <div class="info-value wave" id="waveDisp">1</div>
      </div>
      <div class="info-item">
        <div class="info-label">Combo</div>
        <div class="info-value bonus" id="comboDisp">x1</div>
      </div>
    </div>

    <!-- 生命 -->
    <div class="lives" id="livesContainer"></div>

    <!-- 画布 + 覆盖层 -->
    <div class="canvas-container">
      <canvas id="c"></canvas>
      <div class="overlay" id="overlay">
        <div class="overlay-title" id="ovTitle"></div>
        <div class="overlay-sub" id="ovSub"></div>
        <button class="overlay-btn" id="restartBtn">PLAY · 开始</button>
      </div>
    </div>

    <!-- 操作提示 -->
    <div class="controls">
      <span class="key active-key">← →</span><span style="color:#444;">移动</span>
      <span style="color:#2a2a3a;">|</span>
      <span class="key active-key">鼠标</span><span style="color:#444;">移动</span>
      <span style="color:#2a2a3a;">|</span>
      <span class="key active-key">触屏拖动</span><span style="color:#444;">移动+发射</span>
      <span style="color:#2a2a3a;">|</span>
      <span class="key">Space</span><span style="color:#444;">发射/暂停</span>
      <span style="color:#2a2a3a;">|</span>
      <span class="key">Space</span><span style="color:#444;">GAME OVER 时开始下一局</span>
    </div>
  </div>

  <!-- ===== 右侧：最高分面板（桌面端） / 底部（移动端） ===== -->
  <div class="best-panel" id="bestPanel">
    <div class="best-panel-label">Best</div>
    <div class="best-panel-value" id="bestDisp">0</div>
    <div class="best-panel-wave" id="bestWaveDisp"></div>
  </div>
</div>

<script>
// ============================================================
//  霓虹打砖块 — Neon Breakout
//  暗色主题 · 无限波次 · 随机砖块 · 连击系统
// ============================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// 画布尺寸
const W = 600, H = 700;
canvas.width = W; canvas.height = H;

// DOM 引用
const scoreDisp   = document.getElementById('scoreDisp');
const waveDisp    = document.getElementById('waveDisp');
const comboDisp   = document.getElementById('comboDisp');
const bestDisp    = document.getElementById('bestDisp');
const bestWaveDisp = document.getElementById('bestWaveDisp');
const livesCont   = document.getElementById('livesContainer');
const overlay     = document.getElementById('overlay');
const ovTitle     = document.getElementById('ovTitle');
const ovSub       = document.getElementById('ovSub');
const restartBtn  = document.getElementById('restartBtn');

// ============================================================
//  游戏状态
// ============================================================
const PADDLE_W = 100;
const PADDLE_H = 12;
const PADDLE_Y = H - 50;
const BALL_R   = 7;
const BASE_SPEED = 7;

let paddleX = W / 2 - PADDLE_W / 2;
let ball = { x: 0, y: 0, vx: 0, vy: 0 };
let ballOnPaddle = true;
let bricks = [];
let particles = [];
let score = 0;
let bestScore = 0;
let bestWave = 1;
let lives = 3;
let combo = 0;
let maxCombo = 0;
let wave = 1;
let gameState = 'waiting';   // waiting | playing | paused | over
let keys = {};
let lastTime = 0;            // 上一帧时间戳（用于 delta time）

// ============================================================
//  砖块颜色池（随机抽取）
// ============================================================
const COLOR_POOL = [
  { fill: '#ff3366', glow: '#ff3366' },
  { fill: '#ff6622', glow: '#ff6622' },
  { fill: '#ffaa00', glow: '#ffaa00' },
  { fill: '#ffdd00', glow: '#ffdd00' },
  { fill: '#88ff00', glow: '#88ff00' },
  { fill: '#00ff88', glow: '#00ff88' },
  { fill: '#00ddbb', glow: '#00ddbb' },
  { fill: '#00ccff', glow: '#00ccff' },
  { fill: '#4488ff', glow: '#4488ff' },
  { fill: '#aa44ff', glow: '#aa44ff' },
  { fill: '#ff44cc', glow: '#ff44cc' },
];

// 砖块布局常量
const BRICK_COLS = 10;
const BRICK_W = 52;
const BRICK_H = 18;
const BRICK_PAD = 4;
const BRICK_TOP = 60;
const BRICK_LEFT = (W - BRICK_COLS * (BRICK_W + BRICK_PAD) + BRICK_PAD) / 2;

// 最高分（localStorage）
try {
  const saved = JSON.parse(localStorage.getItem('breakoutBest') || '{}');
  bestScore = saved.score || 0;
  bestWave  = saved.wave || 1;
} catch(e) {}
bestDisp.textContent = bestScore;
bestWaveDisp.textContent = bestWave > 1 ? `Wave ${bestWave}` : '';

// ============================================================
//  随机生成砖块（随波次增加难度）
// ============================================================
function createBricks() {
  bricks = [];
  // 波次越高，行数越多（最少 5 行，最多 9 行）
  const rows = Math.min(5 + Math.floor((wave - 1) / 2), 9);
  // 随机选择哪些列有砖块（波次越高越密）
  const density = Math.min(0.7 + wave * 0.03, 1.0);

  for (let row = 0; row < rows; row++) {
    // 每行随机颜色
    const color = COLOR_POOL[Math.floor(Math.random() * COLOR_POOL.length)];
    for (let col = 0; col < BRICK_COLS; col++) {
      // 按密度随机跳过一些砖块（制造缺口）
      if (Math.random() > density) continue;

      // 血量：深行（上面）+ 高波次 = 更多血量
      const depthBonus = row < 3 ? 1 : 0;
      const waveBonus = Math.floor((wave - 1) / 3);
      const hp = 1 + depthBonus + waveBonus;

      bricks.push({
        x: BRICK_LEFT + col * (BRICK_W + BRICK_PAD),
        y: BRICK_TOP  + row * (BRICK_H + BRICK_PAD),
        w: BRICK_W,
        h: BRICK_H,
        hp: hp,
        maxHp: hp,
        color: color,
      });
    }
  }
}

function resetBall() {
  ballOnPaddle = true;
  ball.x = paddleX + PADDLE_W / 2;
  ball.y = PADDLE_Y - BALL_R;
  ball.vx = 0;
  ball.vy = 0;
  combo = 0;
  updateCombo();
}

function initGame(fullReset) {
  if (fullReset) {
    score = 0;
    lives = 3;
    combo = 0;
    maxCombo = 0;
    wave = 1;
    createBricks();
  }
  paddleX = W / 2 - PADDLE_W / 2;
  resetBall();
  particles = [];
  updateScore();
  updateWave();
  updateLives();
}

/** 发射球 */
function launchBall() {
  if (!ballOnPaddle) return;
  ballOnPaddle = false;
  // 速度 = 基础速度 + 波次加成 + 分数加成（每50分提速0.3）
  const scoreBonus = Math.floor(score / 50) * 0.3;
  const speed = BASE_SPEED + (wave - 1) * 0.4 + scoreBonus;
  const angle = (Math.random() - 0.5) * Math.PI * 0.45 - Math.PI / 2;
  ball.vx = Math.cos(angle) * speed;
  ball.vy = Math.sin(angle) * speed;
}

/** 进入下一波（方块打完时调用）*/
function nextWave() {
  wave++;
  score += lives * 20;  // 剩余生命奖励
  createBricks();
  resetBall();
  updateScore();
  updateWave();

  // 更新最高波次
  if (wave > bestWave) {
    bestWave = wave;
    bestWaveDisp.textContent = `Wave ${bestWave}`;
    saveBest();
  }
}

/** 砖块摧毁粒子 */
function spawnBrickParticles(b) {
  const cx = b.x + b.w / 2, cy = b.y + b.h / 2;
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: cx, y: cy,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4 - 1,
      size: 2 + Math.random() * 3,
      life: 1,
      color: b.color.fill,
    });
  }
}

// ============================================================
//  更新逻辑
// ============================================================
function update(dt) {
  // dt: 归一化时间增量，60fps 时 dt=1，30fps 时 dt≈2
  // 挡板（键盘）
  const P_SPEED = 8;       // px/(60fps帧)
  if (keys['ArrowLeft']  || keys['a']) paddleX -= P_SPEED * dt;
  if (keys['ArrowRight'] || keys['d']) paddleX += P_SPEED * dt;
  paddleX = Math.max(0, Math.min(W - PADDLE_W, paddleX));

  // 球吸附挡板
  if (ballOnPaddle) {
    ball.x = paddleX + PADDLE_W / 2;
    ball.y = PADDLE_Y - BALL_R;
  }

  // 球移动
  if (!ballOnPaddle && gameState === 'playing') {
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    // 墙壁反弹
    if (ball.x - BALL_R <= 0) { ball.x = BALL_R; ball.vx = Math.abs(ball.vx); }
    if (ball.x + BALL_R >= W) { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx); }
    if (ball.y - BALL_R <= 0) { ball.y = BALL_R; ball.vy = Math.abs(ball.vy); }

    // 球掉底 → 扣命
    if (ball.y - BALL_R > H) {
      lives--;
      updateLives();
      combo = 0;
      updateCombo();
      if (lives <= 0) {
        endGame();
      } else {
        resetBall();
      }
      return;
    }

    // 挡板碰撞
    if (
      ball.vy > 0 &&
      ball.y + BALL_R >= PADDLE_Y &&
      ball.y + BALL_R <= PADDLE_Y + PADDLE_H + 8 &&
      ball.x >= paddleX - BALL_R &&
      ball.x <= paddleX + PADDLE_W + BALL_R
    ) {
      ball.y = PADDLE_Y - BALL_R;
      const hitPos = (ball.x - paddleX) / PADDLE_W;
      const angle = (hitPos - 0.5) * Math.PI * 0.7 - Math.PI / 2;
      const spd = Math.sqrt(ball.vx ** 2 + ball.vy ** 2);
      ball.vx = Math.cos(angle) * spd;
      ball.vy = Math.sin(angle) * spd;
      if (ball.vy > 0) ball.vy = -ball.vy;
      combo = 0;
      updateCombo();
    }

    // 砖块碰撞
    for (let i = bricks.length - 1; i >= 0; i--) {
      const b = bricks[i];
      if (ball.x + BALL_R > b.x && ball.x - BALL_R < b.x + b.w &&
          ball.y + BALL_R > b.y && ball.y - BALL_R < b.y + b.h) {

        const ol = (ball.x + BALL_R) - b.x;
        const or = (b.x + b.w) - (ball.x - BALL_R);
        const ot = (ball.y + BALL_R) - b.y;
        const ob = (b.y + b.h) - (ball.y - BALL_R);
        const minO = Math.min(ol, or, ot, ob);
        if (minO === ol || minO === or) ball.vx = -ball.vx;
        if (minO === ot || minO === ob) ball.vy = -ball.vy;

        b.hp--;
        spawnBrickParticles(b);

        if (b.hp <= 0) {
          combo++;
          if (combo > maxCombo) maxCombo = combo;
          const comboBonus = Math.min(combo - 1, 10) * 5;
          score += 10 + comboBonus;
          bricks.splice(i, 1);
        }
        updateScore();
        updateCombo();
        break;
      }
    }

    // 方块全清 → 下一波（不再结束游戏）
    if (bricks.length === 0) {
      nextWave();
    }
  }

  // 粒子衰减（与帧率解耦）
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= 0.025 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.05 * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ============================================================
//  绘制
// ============================================================
function draw() {
  ctx.fillStyle = '#0b0b18';
  ctx.fillRect(0, 0, W, H);

  // 网格
  ctx.strokeStyle = '#111128';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 30) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 30) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // 砖块
  bricks.forEach(b => {
    const alpha = b.hp / b.maxHp;
    ctx.shadowColor = b.color.glow;
    ctx.shadowBlur = 8;
    ctx.fillStyle = b.color.fill;
    ctx.globalAlpha = 0.4 + alpha * 0.6;
    roundRect(b.x, b.y, b.w, b.h, 3);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.strokeStyle = b.color.glow;
    ctx.globalAlpha = 0.5;
    ctx.lineWidth = 1;
    roundRect(b.x, b.y, b.w, b.h, 3);
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // 挡板
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 16;
  const grad = ctx.createLinearGradient(paddleX, PADDLE_Y, paddleX, PADDLE_Y + PADDLE_H);
  grad.addColorStop(0, '#00ff88');
  grad.addColorStop(1, '#00aa55');
  ctx.fillStyle = grad;
  roundRect(paddleX, PADDLE_Y, PADDLE_W, PADDLE_H, PADDLE_H / 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // 球
  if (!ballOnPaddle || gameState === 'playing') {
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffdd00';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_R * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // 粒子
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // 暂停
  if (gameState === 'paused') {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', W/2, H/2);
    ctx.fillStyle = '#666';
    ctx.font = '13px "Courier New", monospace';
    ctx.fillText('按 Space 继续', W/2, H/2 + 30);
  }

  // 发射提示
  if (ballOnPaddle && gameState === 'playing') {
    ctx.fillStyle = '#888';
    ctx.font = '12px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('按 Space 发射', W/2, PADDLE_Y - 28);
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ============================================================
//  游戏循环
// ============================================================
function loop(timestamp) {
  // 计算 delta time（归一化到 60fps = 1.0）
  if (lastTime === 0) lastTime = timestamp;
  let dt = (timestamp - lastTime) / (1000 / 60);  // 60fps 基准
  // 防止切后台回来时 dt 爆炸（上限 4，即最低 15fps）
  if (dt > 4) dt = 4;
  lastTime = timestamp;

  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ============================================================
//  UI
// ============================================================
function updateScore()  { scoreDisp.textContent = score; }
function updateWave()   { waveDisp.textContent = wave; }
function updateCombo()  { comboDisp.textContent = combo > 1 ? `x${combo}` : 'x1'; }
function updateLives() {
  let html = '';
  for (let i = 0; i < 3; i++) {
    html += `<div class="life-dot${i >= lives ? ' lost' : ''}"></div>`;
  }
  livesCont.innerHTML = html;
}

function saveBest() {
  try { localStorage.setItem('breakoutBest', JSON.stringify({ score: bestScore, wave: bestWave })); } catch(e) {}
}

function endGame() {
  gameState = 'over';
  if (score > bestScore) {
    bestScore = score;
    bestDisp.textContent = bestScore;
    if (wave > bestWave) { bestWave = wave; bestWaveDisp.textContent = `Wave ${bestWave}`; }
    saveBest();
    ovTitle.textContent = 'NEW BEST!';
    ovTitle.style.color = '#ffaa00';
  } else {
    ovTitle.textContent = 'GAME OVER';
    ovTitle.style.color = '#ff3366';
  }
    ovSub.innerHTML = `得分 ${score} &nbsp;·&nbsp; 第 ${wave} 波<br>最大连击 x${maxCombo}<br><span style="color:#00ff88; font-size:12px;">按 空格键 开始下一局</span>`;
  overlay.classList.add('active');
}

function startGame(fullReset) {
  initGame(fullReset);
  gameState = 'playing';
  overlay.classList.remove('active');
  updateLives();
  updateScore();
  updateWave();
  updateCombo();
}

// ============================================================
//  输入
// ============================================================
document.addEventListener('keydown', e => {
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) {
    e.preventDefault();
  }
  keys[e.key] = true;

  if (e.key === ' ') {
    // 游戏结束 → 空格重新开始
    if (gameState === 'over') {
      startGame(true);
      return;
    }
    // 游戏中：发射或暂停
    if (gameState === 'playing' && ballOnPaddle) {
      launchBall();
    } else if (gameState === 'playing') {
      gameState = 'paused';
    } else if (gameState === 'paused') {
      gameState = 'playing';
    }
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
// 鼠标移动 → 挡板跟随
function movePaddleTo(clientX) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  paddleX = Math.max(0, Math.min(W - PADDLE_W, (clientX - rect.left) * scaleX - PADDLE_W / 2));
  if (ballOnPaddle) {
    ball.x = paddleX + PADDLE_W / 2;
    ball.y = PADDLE_Y - BALL_R;
  }
}

canvas.addEventListener('mousemove', e => {
  movePaddleTo(e.clientX);
});

// 触摸事件 — 手指拖动挡板
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  movePaddleTo(touch.clientX);
  // 如果球在挡板上，触摸即发射
  if (gameState === 'playing' && ballOnPaddle) {
    launchBall();
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const touch = e.touches[0];
  movePaddleTo(touch.clientX);
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
});

canvas.addEventListener('click', () => {
  if (gameState === 'playing' && ballOnPaddle) launchBall();
});

restartBtn.addEventListener('click', () => startGame(true));

// ============================================================
//  启动
// ============================================================
startGame(true);
loop();
</script>
